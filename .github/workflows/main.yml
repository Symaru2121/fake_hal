name: Build FakeHAL with AOSP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 180

    steps:
    - name: Checkout FakeHAL
      uses: actions/checkout@v4
      with:
        path: fake_hal

    - name: Install build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          openjdk-17-jdk python3 python3-pip git curl unzip \
          ccache build-essential zip rsync libncurses5 \
          2>/dev/null || true

    - name: Setup ccache
      run: |
        mkdir -p ~/.ccache
        echo "max_size = 20G" > ~/.ccache/ccache.conf
        echo "compression = true" >> ~/.ccache/ccache.conf

    - name: Setup AOSP (if not cached)
      run: |
        export AOSP_ROOT=$HOME/aosp

        # Install repo tool if not present
        if ! command -v repo &>/dev/null; then
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          export PATH=$PATH:~/bin
        fi

        if [ ! -f "$AOSP_ROOT/build/envsetup.sh" ]; then
          mkdir -p $AOSP_ROOT
          cd $AOSP_ROOT

          repo init -u https://android.googlesource.com/platform/manifest \
            -b android-14.0.0_r1 --depth=1

          # Selective sync for faster builds
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle \
            platform/build \
            platform/build/soong \
            platform/prebuilts/build-tools \
            platform/prebuilts/clang/host/linux-x86 \
            platform/prebuilts/go/linux-x86 \
            platform/frameworks/av \
            platform/frameworks/native \
            platform/system/core \
            platform/system/media \
            platform/hardware/interfaces \
            platform/hardware/libhardware \
            platform/external/libjpeg-turbo \
            device/google/pantah \
            device/google/gs201 \
            device/google/flame \
            device/google/coral
        else
          echo "AOSP already present, skipping sync"
        fi

    - name: Copy FakeHAL to AOSP tree
      run: |
        export AOSP_ROOT=$HOME/aosp
        DEST="$AOSP_ROOT/vendor/fake_hal"
        mkdir -p "$DEST"
        rsync -a --delete fake_hal/ "$DEST/" \
          --exclude .git --exclude tests --exclude .github

    - name: Build FakeHAL binary
      run: |
        export AOSP_ROOT=$HOME/aosp
        export PATH=$PATH:~/bin
        export USE_CCACHE=1
        export CCACHE_DIR=$HOME/.ccache
        cd $AOSP_ROOT

        source build/envsetup.sh
        lunch aosp_panther-userdebug

        # Build only our module
        m android.hardware.camera.provider-fake -j$(nproc)

    - name: Collect build artifacts
      run: |
        export AOSP_ROOT=$HOME/aosp
        mkdir -p $GITHUB_WORKSPACE/artifacts

        # Find the built binary
        BINARY=$(find $AOSP_ROOT/out -name "android.hardware.camera.provider-fake" \
          -type f -executable 2>/dev/null | head -1)

        if [ -n "$BINARY" ]; then
          cp "$BINARY" $GITHUB_WORKSPACE/artifacts/
          echo "Binary found: $BINARY"
          ls -lh $GITHUB_WORKSPACE/artifacts/
        else
          echo "WARNING: Binary not found in AOSP output"
          exit 1
        fi

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fake-hal-binary
        path: artifacts/
        retention-days: 30
