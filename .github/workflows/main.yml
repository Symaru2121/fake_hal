name: Build FakeHAL with AOSP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 180

    steps:
    - name: Checkout FakeHAL
      uses: actions/checkout@v4
      with:
        path: fake_hal

    - name: Install build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq           openjdk-17-jdk python3 python3-pip git curl unzip           ccache build-essential zip rsync libncurses5           2>/dev/null || true

    - name: Setup ccache
      run: |
        mkdir -p ~/.ccache
        echo "max_size = 20G" > ~/.ccache/ccache.conf
        echo "compression = true" >> ~/.ccache/ccache.conf

    - name: Setup repo tool
      run: |
        if ! command -v repo &>/dev/null; then
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
        fi
        echo "/home/user/bin" >> 

    - name: Setup AOSP (if not cached)
      run: |
        export AOSP_ROOT=/home/user/aosp

        if [ ! -f "/build/envsetup.sh" ]; then
          mkdir -p 
          cd 

          repo init -u https://android.googlesource.com/platform/manifest             -b android-14.0.0_r1 --depth=1

          # Full sync — selective sync causes missing deps
          # First run takes hours, subsequent runs are cached
          repo sync -c -j2 --no-tags --no-clone-bundle --optimized-fetch
        else
          echo "AOSP already present, skipping sync"
          echo "To force re-sync, remove ~/aosp/build/envsetup.sh"
        fi

    - name: Copy FakeHAL to AOSP tree
      run: |
        export AOSP_ROOT=/home/user/aosp
        DEST="/vendor/fake_hal"
        mkdir -p ""
        rsync -a --delete fake_hal/ "/"           --exclude .git --exclude tests --exclude .github

    - name: Build FakeHAL binary
      run: |
        export AOSP_ROOT=/home/user/aosp
        export USE_CCACHE=1
        export CCACHE_DIR=/home/user/.ccache
        cd 

        source build/envsetup.sh
        lunch aosp_panther-userdebug

        # Build only our module
        m android.hardware.camera.provider-fake -j2

    - name: Collect build artifacts
      run: |
        export AOSP_ROOT=/home/user/aosp
        mkdir -p /artifacts

        # Find the built binary
        BINARY=$(find /out -name "android.hardware.camera.provider-fake"           -type f -executable 2>/dev/null | head -1)

        if [ -n "$BINARY" ]; then
          cp "$BINARY" /artifacts/
          echo "Binary found: $BINARY"
          ls -lh /artifacts/
        else
          echo "WARNING: Binary not found in AOSP output"
          exit 1
        fi

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fake-hal-binary
        path: artifacts/
        retention-days: 30
