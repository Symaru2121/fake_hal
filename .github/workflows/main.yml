name: Build FakeHAL with AOSP

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 180

    steps:
    - name: Checkout FakeHAL
      uses: actions/checkout@v4
      with:
        path: fake_hal

    - name: Install build dependencies
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          openjdk-17-jdk python3 python3-pip git curl unzip \
          ccache build-essential zip rsync libncurses5 \
          2>/dev/null || true

    - name: Setup ccache
      run: |
        mkdir -p ~/.ccache
        echo "max_size = 20G" > ~/.ccache/ccache.conf
        echo "compression = true" >> ~/.ccache/ccache.conf

    - name: Setup repo tool
      run: |
        if ! command -v repo &>/dev/null; then
          mkdir -p ~/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
        fi
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Setup AOSP (if not cached)
      run: |
        export AOSP_ROOT=$HOME/aosp

        if [ ! -f "$AOSP_ROOT/build/envsetup.sh" ]; then
          mkdir -p $AOSP_ROOT
          cd $AOSP_ROOT

          repo init -u https://android.googlesource.com/platform/manifest \
            -b android-14.0.0_r1 --depth=1

          repo sync -c -j$(nproc) --no-tags --no-clone-bundle --optimized-fetch
        else
          echo "AOSP already present, skipping sync"
        fi

    - name: Patch AOSP for vendor HAL compatibility
      run: |
        export AOSP_ROOT=$HOME/aosp

        # Patch libcamera_client to be vendor_available
        CAMERA_BP="$AOSP_ROOT/frameworks/av/camera/Android.bp"
        if ! grep -q 'vendor_available: true' "$CAMERA_BP"; then
          echo "Patching libcamera_client for vendor_available..."
          sed -i '/name: "libcamera_client",/a\    vendor_available: true,' "$CAMERA_BP"
          echo "Patched successfully"
        else
          echo "libcamera_client already patched"
        fi

        # Clean soong intermediates for libcamera_client to pick up the change
        rm -rf "$AOSP_ROOT/out/soong/.intermediates/frameworks/av/camera/libcamera_client" 2>/dev/null || true

    - name: Copy FakeHAL to AOSP tree
      run: |
        export AOSP_ROOT=$HOME/aosp
        DEST="$AOSP_ROOT/vendor/fake_hal"
        mkdir -p "$DEST"
        rsync -a --delete fake_hal/ "$DEST/" \
          --exclude .git --exclude tests --exclude .github

    - name: Build FakeHAL binary
      run: |
        export AOSP_ROOT=$HOME/aosp
        export USE_CCACHE=1
        export CCACHE_DIR=$HOME/.ccache
        cd $AOSP_ROOT

        source build/envsetup.sh
        lunch aosp_panther-userdebug

        # Build only our module
        m android.hardware.camera.provider-fake -j$(nproc)

    - name: Collect build artifacts
      run: |
        export AOSP_ROOT=$HOME/aosp
        mkdir -p $GITHUB_WORKSPACE/artifacts

        BINARY=$(find $AOSP_ROOT/out -name "android.hardware.camera.provider-fake" \
          -type f -executable 2>/dev/null | head -1)

        if [ -n "$BINARY" ]; then
          cp "$BINARY" $GITHUB_WORKSPACE/artifacts/
          echo "Binary found: $BINARY"
          ls -lh $GITHUB_WORKSPACE/artifacts/
        else
          echo "WARNING: Binary not found in AOSP output"
          exit 1
        fi

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fake-hal-binary
        path: artifacts/
        retention-days: 30
